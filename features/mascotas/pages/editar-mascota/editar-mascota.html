<div class="form-container">
    <h2>Editar Mascota</h2>

    <form (ngSubmit)="actualizarMascota()" #editForm="ngForm">

        <!-- ── FOTO ── -->
        <div class="foto-section">
            <div class="foto-preview-wrap">
                @if (fotoPreview) {
                    <img [src]="fotoPreview" alt="Foto de la mascota" class="foto-preview" />
                    <button type="button" class="btn-quitar-foto" (click)="quitarFoto()" title="Quitar foto">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                            <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06z" clip-rule="evenodd"/>
                        </svg>
                    </button>
                } @else {
                    <div class="foto-placeholder">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="40" height="40">
                            <path fill-rule="evenodd" d="M1.5 6a2.25 2.25 0 0 1 2.25-2.25h16.5A2.25 2.25 0 0 1 22.5 6v12a2.25 2.25 0 0 1-2.25 2.25H3.75A2.25 2.25 0 0 1 1.5 18V6zM3 16.06V18c0 .414.336.75.75.75h16.5A.75.75 0 0 0 21 18v-1.94l-2.69-2.689a1.5 1.5 0 0 0-2.12 0l-.88.879.97.97a.75.75 0 1 1-1.06 1.06l-5.16-5.159a1.5 1.5 0 0 0-2.12 0L3 16.061zm10.125-7.81a1.125 1.125 0 1 1 2.25 0 1.125 1.125 0 0 1-2.25 0z" clip-rule="evenodd"/>
                        </svg>
                        <span>Sin foto</span>
                    </div>
                }
            </div>
            <div class="foto-upload-area">
                <label class="btn-upload" for="fotoInputEdit">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="17" height="17">
                        <path fill-rule="evenodd" d="M11.47 2.47a.75.75 0 0 1 1.06 0l4.5 4.5a.75.75 0 0 1-1.06 1.06l-3.22-3.22V16.5a.75.75 0 0 1-1.5 0V4.81L8.03 8.03a.75.75 0 0 1-1.06-1.06l4.5-4.5zM3 15.75a.75.75 0 0 1 .75.75v2.25a1.5 1.5 0 0 0 1.5 1.5h13.5a1.5 1.5 0 0 0 1.5-1.5V16.5a.75.75 0 0 1 1.5 0v2.25a3 3 0 0 1-3 3H5.25a3 3 0 0 1-3-3V16.5a.75.75 0 0 1 .75-.75z" clip-rule="evenodd"/>
                    </svg>
                    {{ fotoPreview ? 'Cambiar foto' : 'Subir foto' }}
                </label>
                <input id="fotoInputEdit" type="file" accept="image/*" (change)="onFotoSeleccionada($event)" style="display:none" />
                <p class="foto-hint">JPG, PNG o WEBP &bull; Máx. 2 MB</p>
                @if (fotoError) { <p class="foto-error">{{ fotoError }}</p> }
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Nombre de la Mascota</label>
                <input type="text" name="nombre" [(ngModel)]="mascota.nombre" placeholder="Ej. Bobby" required />
            </div>

            <div class="form-group">
                <label>Dueño / Responsable</label>
                <input type="text" name="dueno" [(ngModel)]="mascota.dueno" placeholder="Nombre del dueño" required />
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Especie</label>
                <input type="text" name="especie" [(ngModel)]="mascota.especie" placeholder="Ej. Perro, Gato, Ave…" />
            </div>

            <div class="form-group">
                <label>Raza</label>
                <input type="text" name="raza" [(ngModel)]="mascota.raza" placeholder="Ej. Labrador, Siamés…" />
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Teléfono de Contacto</label>
                <input type="tel" name="telefono" [(ngModel)]="mascota.telefono" placeholder="Ej. 987654321" required />
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" [(ngModel)]="mascota.email" placeholder="correo@ejemplo.com" required email />
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Fecha de Nacimiento <span style="color:#aaa;font-weight:400;">(Opcional)</span></label>
                <input type="date" name="fecha_nacimiento" [(ngModel)]="mascota.fecha_nacimiento" />
            </div>
        </div>

        <div class="actions">
            <button type="button" class="btn-cancel" routerLink="/mascotas">Cancelar</button>
            <button type="submit" class="btn-save" [disabled]="!editForm.valid">Guardar Cambios</button>
        </div>
    </form>
</div>
