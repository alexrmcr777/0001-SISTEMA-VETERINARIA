<div class="form-page">

  @if (notFound) {
    <div class="not-found">
      <p>Consulta no encontrada.</p>
      <a routerLink="/consultas" class="btn-back">Volver</a>
    </div>
  } @else {

    <div class="form-header">
      <a routerLink="/consultas" class="btn-back">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
          <path fill-rule="evenodd" d="M7.72 12.53a.75.75 0 0 1 0-1.06l7.5-7.5a.75.75 0 1 1 1.06 1.06L9.31 12l6.97 6.97a.75.75 0 1 1-1.06 1.06l-7.5-7.5z" clip-rule="evenodd"/>
        </svg>
        Volver
      </a>
      <h1>Editar Consulta</h1>
      <p class="page-sub">Modifica los datos clínicos de la consulta</p>
    </div>

    @if (errorMsg) { <div class="alert alert-error">{{ errorMsg }}</div> }

    <form (ngSubmit)="guardar()" novalidate>

      <!-- ── SECCIÓN 1: Datos básicos ── -->
      <div class="section">
        <h2 class="section-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M6.75 2.25A.75.75 0 0 1 7.5 3v1.5h9V3A.75.75 0 0 1 18 3v1.5h.75a3 3 0 0 1 3 3v11.25a3 3 0 0 1-3 3H5.25a3 3 0 0 1-3-3V7.5a3 3 0 0 1 3-3H6V3a.75.75 0 0 1 .75-.75zm13.5 9a1.5 1.5 0 0 0-1.5-1.5H5.25a1.5 1.5 0 0 0-1.5 1.5v7.5a1.5 1.5 0 0 0 1.5 1.5h13.5a1.5 1.5 0 0 0 1.5-1.5v-7.5z" clip-rule="evenodd"/></svg>
          Datos básicos
        </h2>
        <div class="grid">

          <div class="form-group col-2">
            <label>Mascota <span class="req">*</span></label>
            <div class="select-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M15.75 8.25a.75.75 0 0 1 .75.75c0 1.12-.492 2.126-1.27 2.812a.75.75 0 1 1-.992-1.124A2.243 2.243 0 0 0 15 9a.75.75 0 0 1 .75-.75z"/><path fill-rule="evenodd" d="M1.5 4.875C1.5 3.839 2.34 3 3.375 3h17.25c1.035 0 1.875.84 1.875 1.875v9.75c0 1.036-.84 1.875-1.875 1.875H3.375A1.875 1.875 0 0 1 1.5 14.625v-9.75zM8.25 9.75a3.75 3.75 0 1 1 7.5 0 3.75 3.75 0 0 1-7.5 0z" clip-rule="evenodd"/></svg>
              <select [(ngModel)]="id_mascota" name="id_mascota" required>
                <option value="">— Selecciona una mascota —</option>
                @for (m of mascotas; track m.id_mascota) {
                  <option [value]="m.id_mascota">{{ m.nombre }} ({{ m.dueno }})</option>
                }
              </select>
              <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M7 10l5 5 5-5z"/></svg>
            </div>
          </div>

          <div class="form-group">
            <label>Fecha <span class="req">*</span></label>
            <div class="input-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M6 2a1 1 0 0 0-1 1v1H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1V3a1 1 0 1 0-2 0v1H7V3a1 1 0 0 0-1-1zM4 8h16v12H4V8z"/></svg>
              <input type="date" [(ngModel)]="fecha" name="fecha" required />
            </div>
          </div>

          <div class="form-group">
            <label>Hora <span class="req">*</span></label>
            <div class="input-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12.75 6a.75.75 0 0 0-1.5 0v6c0 .414.336.75.75.75h4.5a.75.75 0 0 0 0-1.5h-3.75V6z" clip-rule="evenodd"/></svg>
              <input type="time" [(ngModel)]="hora" name="hora" required />
            </div>
          </div>

          <div class="form-group col-2">
            <label>Motivo de consulta <span class="req">*</span></label>
            <div class="input-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm11.378-3.917c-.89-.777-2.366-.777-3.255 0a.75.75 0 0 1-.988-1.129c1.454-1.272 3.776-1.272 5.23 0 1.513 1.324 1.513 3.518 0 4.842a3.75 3.75 0 0 1-.837.552c-.676.328-1.028.774-1.028 1.152v.75a.75.75 0 0 1-1.5 0v-.75c0-1.279 1.06-2.107 1.875-2.502.182-.088.351-.199.503-.331.83-.727.83-1.857 0-2.584zM12 18a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5z" clip-rule="evenodd"/></svg>
              <input type="text" [(ngModel)]="motivo_consulta" name="motivo_consulta" placeholder="Motivo de consulta…" required />
            </div>
          </div>

        </div>
      </div>

      <!-- ── SECCIÓN 2: Signos vitales ── -->
      <div class="section">
        <h2 class="section-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 0 1-.383-.218 25.18 25.18 0 0 1-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0 1 12 5.052 5.5 5.5 0 0 1 16.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 0 1-4.244 3.17 15.247 15.247 0 0 1-.383.219l-.022.012-.007.004-.003.001a.752.752 0 0 1-.704 0l-.003-.001z"/></svg>
          Signos vitales <span class="optional">(opcional)</span>
        </h2>
        <div class="grid vitals-grid">
          <div class="form-group">
            <label>Peso (kg)</label>
            <div class="input-wrap"><input type="number" [(ngModel)]="peso" name="peso" placeholder="Ej: 12.5" step="0.1" min="0" /></div>
          </div>
          <div class="form-group">
            <label>Temperatura (°C)</label>
            <div class="input-wrap"><input type="number" [(ngModel)]="temperatura" name="temperatura" placeholder="Ej: 38.5" step="0.1" min="0" /></div>
          </div>
          <div class="form-group">
            <label>Frec. cardíaca (bpm)</label>
            <div class="input-wrap"><input type="number" [(ngModel)]="frecuencia_cardiaca" name="frecuencia_cardiaca" placeholder="Ej: 90" min="0" /></div>
          </div>
          <div class="form-group">
            <label>Frec. respiratoria (rpm)</label>
            <div class="input-wrap"><input type="number" [(ngModel)]="frecuencia_respiratoria" name="frecuencia_respiratoria" placeholder="Ej: 20" min="0" /></div>
          </div>
        </div>
      </div>

      <!-- ── SECCIÓN 3: Diagnóstico y tratamiento ── -->
      <div class="section">
        <h2 class="section-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M5.625 1.5c-1.036 0-1.875.84-1.875 1.875v17.25c0 1.035.84 1.875 1.875 1.875h12.75c1.035 0 1.875-.84 1.875-1.875V12.75A3.75 3.75 0 0 0 16.5 9h-1.875a1.875 1.875 0 0 1-1.875-1.875V5.25A3.75 3.75 0 0 0 9 1.5H5.625zM7.5 15a.75.75 0 0 1 .75-.75h7.5a.75.75 0 0 1 0 1.5h-7.5A.75.75 0 0 1 7.5 15zm.75-6.75a.75.75 0 0 0 0 1.5H12a.75.75 0 0 0 0-1.5H8.25z" clip-rule="evenodd"/></svg>
          Diagnóstico y tratamiento
        </h2>
        <div class="grid">
          <div class="form-group col-2">
            <label>Diagnóstico <span class="req">*</span></label>
            <textarea [(ngModel)]="diagnostico" name="diagnostico" rows="3" placeholder="Diagnóstico clínico…" required></textarea>
          </div>
          <div class="form-group col-2">
            <label>Tratamiento indicado</label>
            <textarea [(ngModel)]="tratamiento" name="tratamiento" rows="3" placeholder="Plan de tratamiento…"></textarea>
          </div>
          <div class="form-group col-2">
            <label>Medicamentos</label>
            <textarea [(ngModel)]="medicamentos" name="medicamentos" rows="2" placeholder="Medicamentos prescritos…"></textarea>
          </div>
        </div>
      </div>

      <!-- ── SECCIÓN 4: Seguimiento ── -->
      <div class="section">
        <h2 class="section-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12.75 6a.75.75 0 0 0-1.5 0v6c0 .414.336.75.75.75h4.5a.75.75 0 0 0 0-1.5h-3.75V6z" clip-rule="evenodd"/></svg>
          Seguimiento <span class="optional">(opcional)</span>
        </h2>
        <div class="grid">
          <div class="form-group">
            <label>Próxima cita</label>
            <div class="input-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M6 2a1 1 0 0 0-1 1v1H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1V3a1 1 0 1 0-2 0v1H7V3a1 1 0 0 0-1-1zM4 8h16v12H4V8z"/></svg>
              <input type="date" [(ngModel)]="proxima_cita" name="proxima_cita" />
            </div>
          </div>
          <div class="form-group col-2">
            <label>Observaciones adicionales</label>
            <textarea [(ngModel)]="observaciones" name="observaciones" rows="2" placeholder="Notas adicionales…"></textarea>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <a routerLink="/consultas" class="btn-cancel">Cancelar</a>
        <button type="submit" class="btn-save" [disabled]="loading">
          @if (loading) { <span class="spinner"></span> } @else {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="17" height="17"><path fill-rule="evenodd" d="M19.916 4.626a.75.75 0 0 1 .208 1.04l-9 13.5a.75.75 0 0 1-1.154.114l-6-6a.75.75 0 0 1 1.06-1.06l5.353 5.353 8.493-12.74a.75.75 0 0 1 1.04-.207z" clip-rule="evenodd"/></svg>
            Guardar cambios
          }
        </button>
      </div>

    </form>
  }

</div>
