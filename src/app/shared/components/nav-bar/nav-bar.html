<!-- Mobile hamburger toggle (only visible on small screens) -->
<button class="hamburger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()" aria-label="Menú de navegación">
  <span></span><span></span><span></span>
</button>

<!-- Overlay to close menu on mobile when clicking outside -->
@if (menuOpen()) {
  <div class="nav-overlay" (click)="closeMenu()"></div>
}

<nav class="navBar" [class.nav-open]="menuOpen()">
    <div class="navBar-logo">
        @if (profilePhoto()) {
          <img [src]="profilePhoto()" alt="Foto de perfil" class="logo-photo">
        } @else {
          <img src="logo.avif" alt="Logo">
        }
        <h1>Clínica Veterinaria Pet Care</h1>
    </div>
    <div class="navBar-links">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Inicio</a>
        <a routerLink="/mascotas" routerLinkActive="active" (click)="closeMenu()">Mascotas</a>
        <a routerLink="/duenos" routerLinkActive="active" (click)="closeMenu()">Dueños</a>
        <a routerLink="/citas" routerLinkActive="active" (click)="closeMenu()">Citas</a>
        @if (isVet) {
          <a routerLink="/consultas" routerLinkActive="active" (click)="closeMenu()">Consultas</a>
          <a routerLink="/reportes" routerLinkActive="active" (click)="closeMenu()">Reportes</a>
        }
        <a routerLink="/configuracion" routerLinkActive="active" (click)="closeMenu()">Configuración</a>
    </div>

    <div class="navBar-user">
      @if (userName) {
        <div class="user-chip">
          <div class="user-avatar">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
              <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0zM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695z" clip-rule="evenodd"/>
            </svg>
          </div>
          <span class="user-name">{{ userName }}</span>
        </div>
        <button class="btn-logout" (click)="logout()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
            <path fill-rule="evenodd" d="M7.5 3.75A1.5 1.5 0 0 0 6 5.25v13.5a1.5 1.5 0 0 0 1.5 1.5h6a1.5 1.5 0 0 0 1.5-1.5V15a.75.75 0 0 1 1.5 0v3.75a3 3 0 0 1-3 3h-6a3 3 0 0 1-3-3V5.25a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3V9A.75.75 0 0 1 15 9V5.25a1.5 1.5 0 0 0-1.5-1.5h-6zm5.03 4.72a.75.75 0 0 1 0 1.06l-1.72 1.72h10.94a.75.75 0 0 1 0 1.5H10.81l1.72 1.72a.75.75 0 1 1-1.06 1.06l-3-3a.75.75 0 0 1 0-1.06l3-3a.75.75 0 0 1 1.06 0z" clip-rule="evenodd"/>
          </svg>
          Cerrar sesión
        </button>
      }
    </div>
</nav>
